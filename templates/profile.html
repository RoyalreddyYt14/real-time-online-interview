<!DOCTYPE html>
<html>
<head>

<title>Candidate Profile</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.profile-box{
width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>
{% include 'base.html' %}

<div class="profile-box">

<h3 class="mb-4">Complete Candidate Profile</h3>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="phone" placeholder="Phone" class="form-control mb-2">
<input type="text" name="education" placeholder="Education" class="form-control mb-2">
<input type="text" name="experience" placeholder="Experience" class="form-control mb-2">

<!-- 🔥 RESUME -->
<div class="mb-3">
<label>Upload Resume (PDF)</label>
<input type="file" name="resume" class="form-control" accept=".pdf">
</div>

<button class="btn btn-primary w-100">Save Profile</button>

</form>

</div>

</body>
</html>
