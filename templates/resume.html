<!DOCTYPE html>
<html>
<head>
  <title>Resume</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
{% include 'base.html' %}

<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <h3 class="mb-2">Resume</h3>
    <p class="text-muted mb-4">
      Candidate: <b>{{ user.name }}</b>
    </p>

    {% if resume_url %}
      <div class="alert alert-success">
        <i class="bi bi-check-circle me-2"></i> Resume uploaded successfully.
      </div>
      <a class="btn btn-primary" href="{{ resume_url }}" target="_blank" rel="noopener noreferrer">
        <i class="bi bi-file-earmark-text me-2"></i> View Resume (PDF)
      </a>
    {% else %}
      <div class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i> No resume uploaded yet.
      </div>
      <a class="btn btn-outline-primary" href="/profile">
        <i class="bi bi-person me-2"></i> Go to Profile
      </a>
    {% endif %}
  </div>
</div>
</body>
</html>
