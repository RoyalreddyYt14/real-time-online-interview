<!DOCTYPE html>
<html>
  <head>
    <title>Aptitude Test</title>

    <style>
      body {
        font-family: Segoe UI, system-ui, -apple-system, Arial, sans-serif;
        background: linear-gradient(180deg, #0b2c4d 0%, #06152d 100%);
        color: #e6eef7;
        padding: 60px 16px;
        min-height: 100vh;
      }
      
      .container {
        background: rgba(255, 255, 255, 0.06);
        padding: 30px;
        border-radius: 16px;
        max-width: 800px;
        margin: auto;
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        animation: rtIn 280ms ease-out both;
      }
      
      .timer {
        color: #fbbf24;
        font-size: 20px;
        font-weight: bold;
      }
      
      @keyframes rtIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      
      button {
        padding: 10px 20px;
        background: #0b5ed7;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }
      
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 35px rgba(0, 0, 0, 0.25);
        background: #2563eb;
      }
    </style>
  </head>

  <body>
    {% include 'base.html' %}

    <div class="container">
      <h2>Aptitude Test</h2>

      <div class="timer" id="timer">Time Left: 120:00</div>
      <div id="formMsg" style="color:#dc3545;font-weight:700;margin-top:10px;"></div>

      <hr />

      <form method="POST" action="/aptitude" id="quizForm">
        <p>
          <b>Questions:</b>
        </p>
        <ol>
          {% for item in aptitude.questions %}
            {% set field_name = 'q' ~ loop.index0 %}
            <li style="margin-bottom:18px;">
              <div>
                <b>Q{{ loop.index }}:</b> {{ item.question }}
              </div>
              {% for option in item.options %}
                <label style="display:block; margin-top:6px;"><input type="radio" name="{{ field_name }}" value="{{ option }}" /> {{ option }}</label>
              {% endfor %}
            </li>
          {% endfor %}
        </ol>

        <input type="hidden" name="score" id="scoreInput" />

        <br /><br />

        <button type="button" onclick="submitTest()">Submit Answers</button>
      </form>
    </div>

    <script>
      // ✅ Submit Logic
      function submitTest() {
        const questions = document.querySelectorAll('ol > li')
        let allAnswered = true
      
        questions.forEach((question) => {
          const selected = question.querySelector('input[type="radio"]:checked')
          if (!selected) {
            allAnswered = false
          }
        })
      
        if (!allAnswered) {
          const msgEl = document.getElementById('formMsg')
          if (msgEl) msgEl.textContent = 'Please answer all questions before submitting.'
          return
        }
      
        document.getElementById('quizForm').submit()
      }
      
      // ✅ Timer
      let time = 7200 // 2 hours
      
      setInterval(function () {
        let minutes = Math.floor(time / 60)
        let seconds = time % 60
      
        document.getElementById('timer').innerText = 'Time Left: ' + minutes + ':' + (seconds < 10 ? '0' + seconds : seconds)
      
        time--
      
        if (time <= 0) {
          document.getElementById('quizForm').submit()
        }
      }, 1000)
    </script>
  </body>
</html>
