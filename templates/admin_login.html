<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body{
      background: linear-gradient(135deg,#0b2c4d 0%, #2b1055 40%, #06142c 100%);
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      color: #e6eef7;
      font-family: Segoe UI, system-ui, -apple-system, Arial, sans-serif;
    }
    .box{
      width: min(520px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
    }
    .brand{
      font-weight: 1000;
      letter-spacing: 0.2px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <i class="bi bi-shield-lock me-2"></i> Admin Login
    </div>
    <div class="text-muted mb-4">Secure access to interview analytics and user management.</div>

    <form method="POST" action="/admin/login">
      <div class="mb-3">
        <label class="form-label">Admin Email</label>
        <input class="form-control" type="email" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required>
      </div>

      <button class="btn btn-primary w-100" type="submit">
        <i class="bi bi-box-arrow-in-right me-2"></i> Login
      </button>

      <div class="mt-3 text-center">
        <a href="/login" class="link-light text-decoration-none">Candidate Login</a>
      </div>
    </form>
  </div>
</body>
</html>
