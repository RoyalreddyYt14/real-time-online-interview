<!DOCTYPE html>
<html>

<head>

<title>Face Verification</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f6f9;
margin-top:80px;
}

h2{
color:#0b2c4d;
}

.info{
margin-top:20px;
font-size:18px;
color:#333;
}

.status{
margin-top:30px;
font-weight:bold;
color:#2a7a2a;
font-size:18px;
}

.loader{
margin-top:40px;
border:8px solid #f3f3f3;
border-top:8px solid #0b2c4d;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>
{% include 'base.html' %}

<h2>Face Verification</h2>

<p class="info">
Please look at the system camera for identity verification.
</p>

<div class="loader"></div>

<div class="status" id="statusText">
Opening camera for face detection...
</div>

<p style="margin-top:40px;color:#777;">
Do not move away from the camera.
</p>

<script>
function updateStatus(text) {
    document.getElementById("statusText").innerText = text;
}

function checkFaceStatus() {
    fetch("/face_verification/status")
        .then((response) => response.json())
        .then((data) => {
            if (data.completed) {
                updateStatus("Face verified successfully! Redirecting...");
                setTimeout(() => {
                    window.location.href = "/dashboard";
                }, 1800);
            } else {
                updateStatus(data.message || "Verifying your face... Please wait.");
            }
        })
        .catch(() => {
            updateStatus("Unable to reach verification status. Retrying...");
        });
}

checkFaceStatus();
setInterval(checkFaceStatus, 2500);
</script>

</body>

</html>
