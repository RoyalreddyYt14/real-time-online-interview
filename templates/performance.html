<!DOCTYPE html>
<html>
<head>
  <title>Performance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
{% include 'base.html' %}

<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
      <div>
        <h3 class="mb-1">Performance</h3>
        <div class="text-muted">Candidate: <b>{{ user.name }}</b></div>
      </div>
      <div class="text-end">
        <div class="badge bg-primary fs-6 p-2">{{ status }}</div>
        <div class="mt-2 fw-bold fs-4">{{ total }} / 100</div>
      </div>
    </div>

    <hr class="my-4">

    <div class="row g-3">
      <div class="col-md-6">
        <div class="p-3 border rounded-3 h-100">
          <div class="d-flex align-items-center justify-content-between">
            <div class="fw-bold"><i class="bi bi-graph-up me-2"></i>Aptitude</div>
            <div class="fw-bold">{{ aptitude }} / 20</div>
          </div>
          <div class="progress mt-2" style="height:10px;">
            <div class="progress-bar bg-success" style="width:{{ (aptitude/20)*100 }}%"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border rounded-3 h-100">
          <div class="d-flex align-items-center justify-content-between">
            <div class="fw-bold"><i class="bi bi-laptop me-2"></i>Technical</div>
            <div class="fw-bold">{{ technical }} / 20</div>
          </div>
          <div class="progress mt-2" style="height:10px;">
            <div class="progress-bar bg-success" style="width:{{ (technical/20)*100 }}%"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border rounded-3 h-100">
          <div class="d-flex align-items-center justify-content-between">
            <div class="fw-bold"><i class="bi bi-code-slash me-2"></i>Coding</div>
            <div class="fw-bold">{{ coding }} / 40</div>
          </div>
          <div class="progress mt-2" style="height:10px;">
            <div class="progress-bar bg-success" style="width:{{ (coding/40)*100 }}%"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border rounded-3 h-100">
          <div class="d-flex align-items-center justify-content-between">
            <div class="fw-bold"><i class="bi bi-mic me-2"></i>HR</div>
            <div class="fw-bold">{{ hr }} / 20</div>
          </div>
          <div class="progress mt-2" style="height:10px;">
            <div class="progress-bar bg-success" style="width:{{ (hr/20)*100 }}%"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4 d-flex gap-2 flex-wrap">
      <a class="btn btn-outline-primary" href="/results">
        <i class="bi bi-card-text me-2"></i> View Results Page
      </a>
      <a class="btn btn-outline-secondary" href="/profile">
        <i class="bi bi-person me-2"></i> Update Profile
      </a>
    </div>
  </div>
</div>

</body>
</html>
